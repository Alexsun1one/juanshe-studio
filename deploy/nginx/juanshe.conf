# 卷舍 SaaS · nginx TLS 反代 → web(Next standalone)。改 server_name 为你的真实域名。
# 关键点:① 流式写作走 SSE,/api 必须关 proxy_buffering 否则正文卡住不吐;
#         ② 整本连写是长任务,proxy_read_timeout 放大;③ cookie 默认透传,无需特殊处理。

server {
    listen 80;
    server_name juanshe.example.com;          # ← 改成你的域名
    # 强制跳 HTTPS(Let's Encrypt 验证路径放行)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name juanshe.example.com;          # ← 改成你的域名

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;                 # 导入书稿/长正文 POST

    # API:流式 SSE + 长任务。关缓冲让 token 实时吐;读超时放到 30 分钟容整本连写。
    location /api/ {
        proxy_pass http://web:3100;           # 前端 facade 再内网代理到 api(三跳与本地烟测一致)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;                   # SSE 命门:必须关
        proxy_cache off;
        proxy_read_timeout 1800s;             # 长任务(整本连写)
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://web:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
